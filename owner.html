<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Craveessa — Owner Orders</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;margin:0;padding:16px;background:#fafafa;color:#111}
    header{display:flex;align-items:center;justify-content:space-between}
    h1{font-size:1.1rem;margin:0}
    .meta{font-size:0.9rem;color:#444}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{padding:8px;border:1px solid #eee;text-align:left;font-size:0.9rem}
    .controls{margin-top:10px;display:flex;gap:8px}
    button{padding:8px 10px;border-radius:6px;border:1px solid #ccc;background:white}
    .notice{margin-top:12px;color:#666;font-size:0.9rem}
    .empty{margin-top:18px;color:#999}
  </style>
</head>
<body>
  <header>
    <h1>Craveessa — Orders (Owner)</h1>
    <div class="meta">Auto-refresh: every 3 hours</div>
  </header>

  <div class="controls">
    <button id="refreshBtn">Refresh now</button>
    <div id="lastUpdated" class="meta"></div>
  </div>

  <div id="content">
    <div id="notice" class="notice">Loading orders…</div>
    <div id="tableWrap"></div>
  </div>

  <script src="config.discount.js"></script>
  <script src="owner.js"></script>
</body>
</html>
